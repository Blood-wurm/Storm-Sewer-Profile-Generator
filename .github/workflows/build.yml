name: Build EXE
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: src
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pyinstaller pdfplumber pypdf matplotlib numpy customtkinter tkinterdnd2
      - run: pyinstaller --onefile --windowed --name "Hydraflow-Extension" src/Hydraflow-Extension.py
      - uses: actions/upload-artifact@v4
        with:
          name: Hydraflow-Extension
          path: dist/Hydraflow-Extension.exe
